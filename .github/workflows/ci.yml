# Sentinel-IoT CI/CD Pipeline
# Lint → Test → Build → Deploy

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PHP_VERSION: '8.4'
  NODE_VERSION: '22'

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint:check
      - run: pnpm run types:check

  php-test:
    name: PHP Tests (Pest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: pdo_pgsql, intl, opcache, pcntl, pdo_sqlite
          coverage: none
      - run: composer install --no-interaction --prefer-dist
      - run: vendor/bin/pint --test --format=plain
      - run: php artisan test --compact
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ':memory:'

  build:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: public/build/
          retention-days: 1

  docker-build:
    name: Docker Image Build
    runs-on: ubuntu-latest
    needs: [php-test, build]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/laravel.prod.Dockerfile
          push: false
          tags: sentinel-iot:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [docker-build]
    steps:
      - uses: actions/checkout@v4
      - name: Build image for scanning
        run: docker build -f docker/laravel.prod.Dockerfile -t sentinel-iot:scan .
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: sentinel-iot:scan
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
          format: 'table'

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: corepack enable && pnpm install --frozen-lockfile
      - run: pnpm audit --audit-level=high || true

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /opt/sentinel-iot
            git pull origin main
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
            docker compose -f docker-compose.yml -f docker-compose.prod.yml exec -T laravel-app php artisan migrate --force
            docker compose -f docker-compose.yml -f docker-compose.prod.yml exec -T laravel-app php artisan config:cache
            docker compose -f docker-compose.yml -f docker-compose.prod.yml exec -T laravel-app php artisan route:cache
            docker compose -f docker-compose.yml -f docker-compose.prod.yml exec -T laravel-app php artisan event:cache
            echo "Deploy complete: $(date)"
