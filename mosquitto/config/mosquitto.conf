# Sentinel-IoT Mosquitto broker — hardened config.
#
# Two listeners:
#   1883 — plaintext, for the internal Docker network ONLY. In docker-compose
#          this port is bound to 127.0.0.1 on the host so it is never reachable
#          from the public internet. Service-to-service traffic (ingestor,
#          simulator) inside the compose network uses it.
#   8883 — TLS, the ONLY listener that should ever be exposed to real devices
#          over an untrusted network. Requires certs under /mosquitto/certs
#          (generate with mosquitto/gen-certs.sh).
#
# Anonymous access is disabled; every client authenticates with a username +
# password and is constrained by the ACL file (per-tenant topic namespaces).

# --- Internal plaintext listener (localhost-only via compose port binding) ---
listener 1883
allow_anonymous false

# --- TLS listener for external devices ---------------------------------------
# Enabled automatically once the cert files exist. If you have not generated
# certs yet, comment this block out or run mosquitto/gen-certs.sh first.
listener 8883
allow_anonymous false
cafile /mosquitto/certs/ca.crt
certfile /mosquitto/certs/server.crt
keyfile /mosquitto/certs/server.key
tls_version tlsv1.2
# Set to true and ship per-device client certs for mutual TLS in high-security
password_file /mosquitto/secrets/passwordfile
require_certificate true

# --- Authentication & authorization ------------------------------------------
# password_file already set above at line 29
acl_file /mosquitto/config/aclfile

# --- Hardening limits (backpressure / abuse resistance) ----------------------
# Cap total concurrent connections and per-client in-flight / queued messages
# so a misbehaving or hostile device cannot exhaust broker memory.
max_connections 1000
max_inflight_messages 40
# Reject oversized payloads (256 KB) — IoT telemetry is small; large frames are
# almost always abuse or a misconfigured client.
max_packet_size 262144
# Drop clients that connect but never send a valid CONNECT in time.
persistent_client_expiration 14d

# --- Persistence -------------------------------------------------------------
persistence true
persistence_location /mosquitto/data/
autosave_interval 60

# --- Logging -----------------------------------------------------------------
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type error
log_type warning
log_type notice
log_type all
connection_messages true
log_timestamp true
