name: sentinel-iot

# Base services shared by dev and prod.  laravel-app lives in the
# environment-specific files (docker-compose.dev.yml / docker-compose.prod.yml).
#
# Usage:
#   Dev:   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
#   Prod:  docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: sentinel-mosquitto
    restart: unless-stopped
    ports:
      - "127.0.0.1:1883:1883"
      - "8883:8883"
    volumes:
      - ./mosquitto/config:/mosquitto/config:ro
      - ./mosquitto/secrets:/mosquitto/secrets:rw
      - ./mosquitto/certs:/mosquitto/certs:ro
      - ./mosquitto/logs:/mosquitto/log
      - mosquitto_data:/mosquitto/data
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_pub -h localhost -p 1883 -u sentinel_ingestor -P sentinel_ingestor_password -t tenants/healthcheck/security/ping -m ok || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  postgres:
    image: postgres:16
    container_name: sentinel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: sentinel_iot
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: sentinel_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel -d sentinel_iot"]
      interval: 10s
      timeout: 5s
      retries: 5

  mqtt-ingestor:
    build:
      context: ./services/mqtt-ingestor
      dockerfile: Dockerfile
    container_name: sentinel-mqtt-ingestor
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      mosquitto:
        condition: service_healthy

  telegram-bot:
    build:
      context: ./services/telegram-bot
      dockerfile: Dockerfile
    container_name: sentinel-telegram-bot
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    profiles: ["bot"]

volumes:
  mosquitto_data:
  postgres_data:
